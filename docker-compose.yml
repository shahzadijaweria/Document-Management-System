# One-command local stack: Postgres + Redis + backend + frontend.
#
# Usage:
#   1. Create a top-level `.env` next to this file (NOT committed) with your AWS keys + JWT secrets.
#      See `.env.docker.example` for the variable list.
#   2. docker-compose up --build
#   3. Visit http://localhost:3000
#
# Notes:
#   - Postgres and Redis use named volumes so data persists across `down`/`up`.
#   - Backend depends on healthchecks for both DB and Redis — won't start until they're ready.
#   - On code changes, rebuild with `docker-compose up --build` (no live reload in container mode).

services:
  postgres:
    image: postgres:16-alpine
    container_name: dms-postgres
    environment:
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms_dev_password
      POSTGRES_DB: dms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms -d dms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dms-backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://dms:dms_dev_password@postgres:5432/dms?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # The following are read from your top-level .env file (compose passes them through)
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time (NEXT_PUBLIC_*)
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    container_name: dms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
